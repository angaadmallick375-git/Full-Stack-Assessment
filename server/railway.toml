# Use repo-root railway.toml when possible.
# If Railway root directory is set to "server", use these settings in the dashboard:
#   Build:  npm install && npm run build:client
#   Start:  npm start

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build:client"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
